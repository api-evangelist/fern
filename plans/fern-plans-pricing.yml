specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Fern
providerId: fern
created: '2026-05-04'
modified: '2026-05-22'
sourceUrl: https://www.buildwithfern.com/pricing
tags:
  - Agent Ready
  - AI
  - API Definitions
  - Code Generation
  - Developer Experience
  - Documentation
  - OpenAPI
  - Platform
  - SDKs
description: >-
  Plans and pricing for Fern's hosted docs and SDK platform, captured from the
  public Fern pricing page. Three tiers: Hobby (free forever), Team ($150/mo,
  with a 25% annual discount option), and Enterprise (custom). Tier elements
  reflect the seats, AI credits, custom domain, and authentication features
  bundled with each tier.
plans:
  - id: fern-hobby
    name: Hobby
    type: freemium
    description: Free forever tier intended for evaluation, side projects, and small teams.
    monthlyPrice: '0.00'
    annualPrice: '0.00'
    currency: USD
    entries:
      - label: Team Members
        description: Maximum number of team members on the workspace.
        name: team_members
        type: quota
        metric: seats
        limit: 2
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: AI Credits
        description: Monthly credit allotment for Ask Fern, Fern Writer, and other AI surfaces.
        name: ai_credits
        type: quota
        metric: ai_credits
        limit: 250
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Custom Domain
      - name: Guides
      - name: API References
      - name: Changelogs
      - name: API Explorer
      - name: Web Editor
  - id: fern-team
    name: Team
    type: paid
    description: Production tier for scaling teams. Billed monthly with a 25% discount for annual commitment.
    monthlyPrice: '150.00'
    annualPrice: 'annual discount 25%'
    currency: USD
    entries:
      - label: Team Members
        description: Maximum number of team members on the workspace.
        name: team_members
        type: quota
        metric: seats
        limit: 5
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: AI Credits
        description: Monthly credit allotment for Ask Fern, Fern Writer, and other AI surfaces.
        name: ai_credits
        type: quota
        metric: ai_credits
        limit: 1000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Everything in Hobby
      - name: Custom Subpath
      - name: Version Switching
      - name: Product Switching
      - name: Password-Protected Docs
      - name: PDF Exports
  - id: fern-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-priced tier with enterprise authentication, role-based access control, translations, self-hosting, and dedicated support.
    monthlyPrice: custom
    annualPrice: custom
    currency: USD
    entries:
      - label: Team Members
        description: Negotiated seat count.
        name: team_members
        type: quota
        metric: seats
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
      - label: AI Credits
        description: Negotiated AI credit allotment.
        name: ai_credits
        type: quota
        metric: ai_credits
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Everything in Team
      - name: Visitor Authentication (JWT)
      - name: Enterprise SSO (SAML, OIDC)
      - name: Role-Based Access Control
      - name: Translated Content
      - name: Self-Hosting
      - name: Dedicated Slack or Teams Channel
maintainers:
