  - type: Features
    data:
      - name: SDK Generation
        description: Generate production-ready SDKs in TypeScript, Python, Go, Java, C#, PHP, Ruby, Swift, and Rust from OpenAPI specs.
      - name: API Documentation
        description: Auto-generate beautiful, branded API documentation with interactive examples and playground.
      - name: Ask AI
        description: AI-powered documentation chatbot that answers developer questions using your API docs as context.
      - name: Fern Definition Language
        description: Purpose-built API definition language as an alternative to OpenAPI for defining API contracts.
      - name: OpenAPI Support
        description: First-class OpenAPI specification support for both SDK generation and documentation.
      - name: Versioning
        description: Built-in API versioning support for documentation and SDK generation across multiple API versions.
  - type: UseCases
    data:
      - name: SDK Generation from OpenAPI
        description: Transform OpenAPI specifications into idiomatic client libraries across multiple programming languages.
      - name: Developer Documentation
        description: Generate and host interactive API documentation with custom branding and domain support.
      - name: API-First Development
        description: Define APIs using Fern Definition Language and generate server stubs, SDKs, and documentation.
      - name: SDK Maintenance Automation
        description: Automatically update and publish SDKs when API specifications change, reducing maintenance burden.
      - name: Developer Portal Creation
        description: Build comprehensive developer portals with guides, API references, and SDK documentation.
  - type: Integrations
    data:
      - name: GitHub Actions
        description: CI/CD integration for automatically generating and publishing SDKs on API specification changes.
      - name: npm Registry
        description: Automatic publishing of generated TypeScript/JavaScript SDKs to the npm package registry.
      - name: PyPI
        description: Automatic publishing of generated Python SDKs to the Python Package Index.
      - name: Maven Central
        description: Automatic publishing of generated Java SDKs to Maven Central repository.
      - name: NuGet
        description: Automatic publishing of generated C# SDKs to the NuGet package registry.
