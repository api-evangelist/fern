name: Fern Shared Capabilities
description: >-
  Shared per-provider capabilities for Fern. Captures the foundational primitives
  that every Fern workflow composes on top of: SDK generation, docs publication,
  llms.txt and MCP exposure, and Ask Fern AI grounding.
provider: Fern
providerId: fern
created: '2026-05-22'
tags:
  - Agent Ready
  - AI
  - Code Generation
  - Documentation
  - MCP
  - SDKs
capabilities:
  - id: fern.sdk.generate
    name: Generate SDK
    description: Generate an idiomatic, type-safe SDK in TypeScript, Python, Go, Java, C#, PHP, Ruby, Swift, or Rust from a Fern-managed API definition.
    inputs:
      - apiDefinition
      - generatorConfig
    outputs:
      - generatedSdk
      - releaseTag
  - id: fern.sdk.publish
    name: Publish SDK
    description: Publish a generated SDK to its language-native registry (npm, PyPI, Maven Central, NuGet, RubyGems, Packagist, crates.io, or via Swift Package Manager / Go modules).
    inputs:
      - generatedSdk
      - registryCredentials
    outputs:
      - publishedPackage
  - id: fern.docs.publish
    name: Publish Docs Site
    description: Build and publish a branded, interactive Fern docs site from MDX content plus one or more API references.
    inputs:
      - docsConfig
      - mdxContent
      - apiReferences
    outputs:
      - hostedDocsSite
  - id: fern.docs.llmsTxt
    name: Generate llms.txt
    description: Emit an llms.txt artifact for a Fern docs site so LLMs and AI agents can consume documentation directly.
    inputs:
      - hostedDocsSite
    outputs:
      - llmsTxtArtifact
  - id: fern.mcp.askFern
    name: Ask Fern via MCP
    description: Invoke the ask_fern_ai MCP tool against the Fern knowledge base from Claude, Cursor, Windsurf, or any MCP-aware client.
    inputs:
      - naturalLanguageQuery
      - mcpClient
    outputs:
      - groundedAnswer
  - id: fern.docs.agentScore
    name: Score Agent Readiness
    description: Run Fern's agent-score tooling against a docs site to quantify how navigable and parseable it is for AI agents.
    inputs:
      - docsSiteUrl
    outputs:
      - agentReadinessReport
